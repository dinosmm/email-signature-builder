# Example nginx configuration for the Email Signature Builder.
# Replace signatures.example.org and paths with values for your server.

server {
    listen 80;
    server_name signatures.example.org;

    # If using Certbot, it can manage the HTTPS redirect/server block for you.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name signatures.example.org;

    ssl_certificate /etc/letsencrypt/live/signatures.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signatures.example.org/privkey.pem;

    root /opt/email-signature-builder/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Defence in depth: these paths should not exist under the public root.
    location ^~ /config/ { deny all; }
    location ^~ /scripts/ { deny all; }
    location ^~ /src/ { deny all; }
}
