# Hardened example nginx configuration for the Email Signature Builder.
# Replace signatures.example.org and paths with values for your server.
#
# This intentionally allow-lists only the files the browser needs. If you rename
# the school logo in public/defaults.js, add a matching location below.

server {
    listen 80;
    server_name signatures.example.org;

    # If using Certbot, it can manage the HTTPS redirect/server block for you.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name signatures.example.org;

    ssl_certificate /etc/letsencrypt/live/signatures.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signatures.example.org/privkey.pem;

    root /opt/email-signature-builder/public;
    index index.html;

    # Security headers suitable for this static app. The inline styles in the
    # generated email-signature HTML require 'unsafe-inline' for style-src.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'none'" always;

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location = /styles.css {
        try_files /styles.css =404;
        add_header Cache-Control "no-store" always;
    }

    location = /defaults.js {
        try_files /defaults.js =404;
        add_header Cache-Control "no-store" always;
    }

    location = /app.js {
        try_files /app.js =404;
        add_header Cache-Control "no-store" always;
    }

    # The web UI must be able to load the logo directly. Keep this allow-list in
    # sync with schoolLogoPath in public/defaults.js if you change the filename.
    location ~ ^/assets/school-logo\.(?:png|jpe?g)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # Deny everything else, including README files, source maps, dotfiles, and
    # accidental repository files if nginx is pointed at the wrong directory.
    location / {
        return 404;
    }
}
